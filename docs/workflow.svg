<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
    <style>
      .title { font: 700 28px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .label { font: 600 18px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .small { font: 15px Arial, Helvetica, sans-serif; fill: #334155; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2.2; rx: 16; ry: 16; }
      .rolebox { fill: #eef2ff; stroke: #6366f1; stroke-width: 1.8; rx: 12; ry: 12; }
      .line { stroke: #334155; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 1.8; fill: none; stroke-dasharray: 8 7; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 18; ry: 18; }
    </style>
  </defs>

  <rect x="20" y="20" width="1760" height="940" class="panel" />
  <text x="60" y="70" class="title">Radar Mosaic + Radar Nowcast Workflow (NCK + NGK)</text>
  <text x="60" y="100" class="small">Operational baseline: UF ingest → QC → common grid → mosaic → rain-rate → motion → nowcast → verification → publish</text>

  <!-- Roles -->
  <rect x="60" y="130" width="1680" height="120" class="panel" />
  <text x="80" y="160" class="label">Core roles</text>
  <g>
    <rect x="80" y="180" width="150" height="42" class="rolebox" /><text x="92" y="206" class="small">Data Engineer</text>
    <rect x="245" y="180" width="170" height="42" class="rolebox" /><text x="257" y="206" class="small">Radar Domain Lead</text>
    <rect x="430" y="180" width="210" height="42" class="rolebox" /><text x="442" y="206" class="small">Mosaic / Geospatial Eng</text>
    <rect x="655" y="180" width="160" height="42" class="rolebox" /><text x="667" y="206" class="small">Nowcast Engineer</text>
    <rect x="830" y="180" width="185" height="42" class="rolebox" /><text x="842" y="206" class="small">QA / Verification</text>
    <rect x="1030" y="180" width="145" height="42" class="rolebox" /><text x="1042" y="206" class="small">SRE / DevOps</text>
    <rect x="1190" y="180" width="180" height="42" class="rolebox" /><text x="1202" y="206" class="small">API / App Engineer</text>
    <rect x="1385" y="180" width="140" height="42" class="rolebox" /><text x="1397" y="206" class="small">Service Owner</text>
    <rect x="1540" y="180" width="180" height="42" class="rolebox" /><text x="1552" y="206" class="small">Security / Governance</text>
  </g>

  <!-- Main boxes -->
  <g>
    <rect x="70" y="330" width="160" height="110" class="box" />
    <text x="92" y="360" class="label">UF Ingestion</text>
    <text x="92" y="388" class="small">read .uf</text>
    <text x="92" y="410" class="small">parse time</text>
    <text x="92" y="432" class="small">inspect fields</text>

    <rect x="265" y="330" width="170" height="110" class="box" />
    <text x="287" y="360" class="label">QC + Validation</text>
    <text x="287" y="388" class="small">clutter mask</text>
    <text x="287" y="410" class="small">sanity checks</text>
    <text x="287" y="432" class="small">quality flags</text>

    <rect x="470" y="330" width="185" height="110" class="box" />
    <text x="492" y="360" class="label">Polar → Cartesian</text>
    <text x="492" y="388" class="small">common CRS</text>
    <text x="492" y="410" class="small">common grid</text>
    <text x="492" y="432" class="small">same spacing</text>

    <rect x="690" y="330" width="180" height="110" class="box" />
    <text x="712" y="360" class="label">Mosaic NCK + NGK</text>
    <text x="712" y="388" class="small">overlap handling</text>
    <text x="712" y="410" class="small">missing data rules</text>
    <text x="712" y="432" class="small">seam diagnostics</text>

    <rect x="905" y="330" width="170" height="110" class="box" />
    <text x="927" y="360" class="label">Rain-rate Prep</text>
    <text x="927" y="388" class="small">dBZ → Z → R</text>
    <text x="927" y="410" class="small">thresholding</text>
    <text x="927" y="432" class="small">denoise</text>

    <rect x="1110" y="330" width="170" height="110" class="box" />
    <text x="1132" y="360" class="label">Motion Estimation</text>
    <text x="1132" y="388" class="small">Lucas–Kanade</text>
    <text x="1132" y="410" class="small">DARTS / other</text>
    <text x="1132" y="432" class="small">save velocity field</text>
  </g>

  <g>
    <rect x="1020" y="540" width="180" height="120" class="box" />
    <text x="1042" y="572" class="label">Deterministic</text>
    <text x="1042" y="600" class="label">Nowcast</text>
    <text x="1042" y="628" class="small">extrapolation</text>
    <text x="1042" y="650" class="small">15–120 min</text>

    <rect x="1235" y="540" width="180" height="120" class="box" />
    <text x="1257" y="572" class="label">Ensemble</text>
    <text x="1257" y="600" class="label">Nowcast</text>
    <text x="1257" y="628" class="small">STEPS</text>
    <text x="1257" y="650" class="small">uncertainty</text>

    <rect x="1450" y="540" width="170" height="120" class="box" />
    <text x="1472" y="572" class="label">Verification</text>
    <text x="1472" y="600" class="small">CSI / FSS / RMSE</text>
    <text x="1472" y="622" class="small">lead-time metrics</text>
    <text x="1472" y="644" class="small">regression checks</text>

    <rect x="1450" y="760" width="190" height="120" class="box" />
    <text x="1472" y="792" class="label">Publish / Storage</text>
    <text x="1472" y="820" class="small">NetCDF / GeoTIFF</text>
    <text x="1472" y="842" class="small">PNG / API output</text>
  </g>

  <!-- Main arrows -->
  <path d="M230 385 L265 385" class="line" />
  <path d="M435 385 L470 385" class="line" />
  <path d="M655 385 L690 385" class="line" />
  <path d="M870 385 L905 385" class="line" />
  <path d="M1075 385 L1110 385" class="line" />
  <path d="M1195 440 L1195 540" class="line" />
  <path d="M1235 440 L1325 540" class="line" />
  <path d="M1200 660 L1450 600" class="line" />
  <path d="M1415 600 L1450 600" class="line" />
  <path d="M1535 660 L1545 760" class="line" />

  <!-- Cross-cutting dashed lines -->
  <path d="M1095 222 C1095 280, 120 250, 120 330" class="dash" />
  <text x="930" y="250" class="small">SRE: monitoring / alerts</text>

  <path d="M1095 222 C1095 300, 1545 300, 1545 760" class="dash" />
  <text x="1160" y="290" class="small">SRE: deploy / rollback</text>

  <path d="M1630 222 C1630 280, 180 270, 180 330" class="dash" />
  <text x="1420" y="250" class="small">Security: access control / audit</text>

  <path d="M1630 222 C1630 320, 1660 320, 1660 760" class="dash" />
  <text x="1450" y="315" class="small">Security: metadata / versioning</text>

  <path d="M1455 222 C1455 300, 1530 300, 1530 540" class="dash" />
  <text x="1320" y="290" class="small">Service Owner: KPI / SLA / acceptance</text>
</svg>
